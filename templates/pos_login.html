<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول - نقاط البيع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        .numpad-btn {
            font-size: 2rem;
            font-weight: bold;
            transition: all 0.15s;
        }
        .numpad-btn:active { transform: scale(0.95); }
        .pin-dot { transition: all 0.2s; }
        .pin-dot.filled { background: #10b981; transform: scale(1.2); }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 via-blue-800 to-indigo-900 flex items-center justify-center p-4">
    
    <div class="w-full max-w-md" x-data="posLogin()">
        
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-24 h-24 bg-white/10 backdrop-blur rounded-3xl mb-4">
                <span class="text-6xl">🏪</span>
            </div>
            <h1 class="text-3xl font-bold text-white">نقاط البيع</h1>
            <p class="text-blue-200 mt-2">أدخل رمز PIN للدخول</p>
        </div>
        
        <!-- PIN Display -->
        <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 mb-6">
            
            <!-- User Selection (if multiple users) -->
            <div class="mb-6" x-show="!selectedUser">
                <label class="block text-white/80 text-sm mb-2">اختر المستخدم</label>
                <div class="grid grid-cols-2 gap-3">
                    {% for user in cashiers %}
                    <button @click="selectUser('{{ user.id }}', '{{ user.full_name }}')"
                            data-user-id="{{ user.id }}" data-user-name="{{ user.full_name }}"
                            class="p-4 bg-white/10 hover:bg-white/20 rounded-xl text-white transition">
                        <div class="w-12 h-12 mx-auto bg-gradient-to-br from-green-400 to-emerald-600 rounded-full flex items-center justify-center mb-2">
                            <span class="text-xl font-bold">{{ user.full_name[0] }}</span>
                        </div>
                        <p class="font-medium">{{ user.full_name }}</p>
                    </button>
                    {% endfor %}
                </div>
            </div>
            
            <!-- Selected User & PIN -->
            <div x-show="selectedUser" x-cloak>
                <!-- Selected User -->
                <div class="flex items-center justify-center gap-3 mb-6">
                    <div class="w-14 h-14 bg-gradient-to-br from-green-400 to-emerald-600 rounded-full flex items-center justify-center">
                        <span class="text-2xl font-bold text-white" x-text="selectedUserName ? selectedUserName[0] : ''"></span>
                    </div>
                    <div class="text-right">
                        <p class="text-white font-bold text-lg" x-text="selectedUserName"></p>
                        <button @click="selectedUser = null; pin = ''" class="text-blue-300 text-sm hover:text-white">تغيير</button>
                    </div>
                </div>
                
                <!-- PIN Dots -->
                <div class="flex justify-center gap-4 mb-8" :class="{'shake': error}">
                    <template x-for="i in 4">
                        <div class="pin-dot w-5 h-5 rounded-full border-2 border-white/50"
                             :class="{'filled': pin.length >= i}"></div>
                    </template>
                </div>
                
                <!-- Error Message -->
                <p x-show="error" x-text="error" class="text-red-400 text-center mb-4 text-sm"></p>
                
                <!-- Numpad -->
                <div class="grid grid-cols-3 gap-3">
                    <template x-for="num in ['1','2','3','4','5','6','7','8','9','C','0','⌫']">
                        <button @click="handleKey(num)"
                                class="numpad-btn h-16 rounded-2xl text-white"
                                :class="{
                                    'bg-white/20 hover:bg-white/30': !['C','⌫'].includes(num),
                                    'bg-red-500/50 hover:bg-red-500/70': num === 'C',
                                    'bg-yellow-500/50 hover:bg-yellow-500/70': num === '⌫'
                                }"
                                x-text="num">
                        </button>
                    </template>
                </div>
            </div>
        </div>
        
        <!-- Back to Main -->
        <div class="text-center">
            <a href="{{ url_for('login') }}" class="text-blue-300 hover:text-white transition">
                ← العودة لتسجيل الدخول العادي
            </a>
        </div>
        
        <!-- Time & Date -->
        <div class="text-center mt-8 text-white/60">
            <p class="text-2xl font-mono" x-text="currentTime"></p>
            <p x-text="currentDate"></p>
        </div>
    </div>

    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
        function posLogin() {
            return {
                selectedUser: null,
                selectedUserName: '',
                pin: '',
                error: '',
                currentTime: '',
                currentDate: '',
                
                init() {
                    this.updateDateTime();
                    setInterval(() => this.updateDateTime(), 1000);
                    
                    // Auto-select if single user
                    const users = document.querySelectorAll('[data-user-id]');
                    if (users.length === 1) {
                        this.selectUser(users[0].dataset.userId, users[0].dataset.userName);
                    }
                },
                
                updateDateTime() {
                    const now = new Date();
                    this.currentTime = now.toLocaleTimeString('ar-YE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    this.currentDate = now.toLocaleDateString('ar-YE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                },
                
                selectUser(id, name) {
                    this.selectedUser = id;
                    this.selectedUserName = name;
                    this.pin = '';
                    this.error = '';
                },
                
                handleKey(key) {
                    this.error = '';
                    
                    if (key === 'C') {
                        this.pin = '';
                    } else if (key === '⌫') {
                        this.pin = this.pin.slice(0, -1);
                    } else if (this.pin.length < 4) {
                        this.pin += key;
                        
                        if (this.pin.length === 4) {
                            this.verifyPin();
                        }
                    }
                },
                
                verifyPin() {
                    fetch('/api/pos/verify-pin', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: this.selectedUser, pin: this.pin })
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            window.location.href = '/pos';
                        } else {
                            this.error = 'رمز PIN غير صحيح';
                            this.pin = '';
                        }
                    })
                    .catch(() => {
                        this.error = 'خطأ في الاتصال';
                        this.pin = '';
                    });
                }
            }
        }
    </script>
</body>
</html>
