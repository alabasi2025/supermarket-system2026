<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغيير كلمة المرور - نظام إدارة السوبرماركت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        .login-bg { background: #0f172a; position: relative; overflow: hidden; }
        .login-bg::before {
            content: ''; position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(245,158,11,0.15) 0%, transparent 70%);
            top: -200px; right: -200px; animation: pulse1 8s ease-in-out infinite;
        }
        @keyframes pulse1 { 0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.2);opacity:0.8} }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .input-modern { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: white; transition: all 0.3s; }
        .input-modern:focus { background: rgba(255,255,255,0.1); border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
        .input-modern::placeholder { color: rgba(255,255,255,0.4); }
        .btn-glow { background: linear-gradient(135deg, #f59e0b, #d97706); position: relative; overflow: hidden; transition: all 0.3s; }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(245,158,11,0.4); }
        .fade-up { animation: fadeUp 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)} }
        .delay-1{animation-delay:.1s}.delay-2{animation-delay:.2s}.delay-3{animation-delay:.3s}
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">
    <div class="relative z-10 w-full max-w-md">
        
        <!-- Icon -->
        <div class="text-center mb-8 fade-up">
            <div class="w-24 h-24 mx-auto mb-4 bg-gradient-to-br from-amber-500 to-orange-600 rounded-3xl flex items-center justify-center shadow-lg shadow-amber-500/30 relative overflow-hidden">
                <svg class="w-12 h-12 text-white relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                </svg>
                <div class="absolute inset-0 bg-gradient-to-br from-white/20 via-transparent to-transparent"></div>
            </div>
            <h1 class="text-3xl font-black text-white">تغيير كلمة المرور</h1>
            <p class="text-slate-400 mt-2">مرحباً <span class="text-amber-400 font-bold">{{ session.full_name }}</span></p>
            <p class="text-slate-500 text-sm mt-1">يجب تغيير كلمة المرور للمتابعة</p>
        </div>
        
        <!-- Card -->
        <div class="glass rounded-3xl p-8 fade-up delay-1">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="mb-6 p-4 rounded-2xl text-sm
                {% if category == 'error' %}bg-red-500/20 text-red-300 border border-red-500/30{% endif %}
                {% if category == 'success' %}bg-green-500/20 text-green-300 border border-green-500/30{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            
            <form method="POST" class="space-y-5">
                <div class="fade-up delay-2">
                    <label class="block text-sm font-medium text-slate-400 mb-2">كلمة المرور الجديدة</label>
                    <input type="password" name="new_password" required minlength="4" autofocus
                           class="w-full px-5 py-4 rounded-2xl input-modern text-lg"
                           placeholder="أدخل كلمة المرور الجديدة">
                </div>
                
                <div class="fade-up delay-2">
                    <label class="block text-sm font-medium text-slate-400 mb-2">تأكيد كلمة المرور</label>
                    <input type="password" name="confirm_password" required minlength="4"
                           class="w-full px-5 py-4 rounded-2xl input-modern text-lg"
                           placeholder="أعد كتابة كلمة المرور">
                </div>
                
                <div class="fade-up delay-3">
                    <button type="submit" class="btn-glow w-full py-4 rounded-2xl text-white font-bold text-lg">
                        تغيير كلمة المرور والدخول
                    </button>
                </div>
            </form>
        </div>
        
        <p class="text-center text-slate-600 text-sm mt-6">نظام إدارة السوبرماركت &copy; 2026</p>
    </div>
</body>
</html>
