{% extends 'base.html' %}

{% block title %}تغيير كلمة المرور - نظام إدارة السوبرماركت{% endblock %}

{% block page_title %}تغيير كلمة المرور{% endblock %}
{% block page_subtitle %}تغيير كلمة المرور الخاصة بك{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form id="changePasswordForm" onsubmit="changePassword(event)" class="space-y-4">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">كلمة المرور الحالية *</label>
                <input type="password" id="currentPassword" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">كلمة المرور الجديدة *</label>
                <input type="password" id="newPassword" required minlength="4"
                       class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">تأكيد كلمة المرور الجديدة *</label>
                <input type="password" id="confirmPassword" required minlength="4"
                       class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <div class="pt-4">
                <button type="submit" class="w-full py-3 px-4 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-colors">
                    تغيير كلمة المرور
                </button>
            </div>
        </form>
    </div>
</div>

<script>
async function changePassword(e) {
    e.preventDefault();
    
    const currentPassword = document.getElementById('currentPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    if (newPassword !== confirmPassword) {
        alert('كلمة المرور الجديدة غير متطابقة');
        return;
    }
    
    try {
        const response = await fetch('/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                current_password: currentPassword,
                new_password: newPassword
            })
        });
        
        const result = await response.json();
        if (result.success) {
            alert('تم تغيير كلمة المرور بنجاح');
            window.location.href = '/dashboard';
        } else {
            alert(result.message || 'حدث خطأ');
        }
    } catch (error) {
        alert('حدث خطأ في الاتصال');
    }
}
</script>
{% endblock %}
