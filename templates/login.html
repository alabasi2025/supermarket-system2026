<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سوبر ماركت العباسي</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: "Tajawal", sans-serif; }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated Background Shapes */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.5;
            animation: float 20s ease-in-out infinite;
        }
        .bg-shape-1 {
            width: 500px; height: 500px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            top: -200px; right: -100px;
            animation-delay: 0s;
        }
        .bg-shape-2 {
            width: 400px; height: 400px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            bottom: -150px; left: -100px;
            animation-delay: -5s;
        }
        .bg-shape-3 {
            width: 300px; height: 300px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }
        
        /* Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Logo */
        .logo-box {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.4);
        }
        
        /* Form */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 16px;
            color: #1f2937;
            background: #f9fafb;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-input:focus {
            border-color: #6366f1;
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .form-input::placeholder { color: #9ca3af; }
        
        /* Button */
        .btn-login {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.5);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        
        /* Remember */
        .remember-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .remember-box input[type="checkbox"] {
            width: 20px; height: 20px;
            accent-color: #6366f1;
            cursor: pointer;
        }
        .remember-box label {
            font-size: 14px;
            color: #6b7280;
            cursor: pointer;
        }
        
        /* POS Link */
        .pos-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
            padding: 14px 20px;
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            border: 2px solid #86efac;
            border-radius: 16px;
            color: #166534;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .pos-link:hover {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            transform: translateY(-2px);
        }
        .pos-link svg {
            width: 24px; height: 24px;
        }
        
        /* Alert */
        .alert {
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .alert-error {
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            border: 1px solid #fca5a5;
            color: #991b1b;
        }
        .alert-success {
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            border: 1px solid #86efac;
            color: #166534;
        }
        
        /* Footer */
        .footer-text {
            text-align: center;
            margin-top: 32px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    
    <!-- Background Shapes -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>
    
    <!-- Login Card -->
    <div class="login-card">
        
        <!-- Logo -->
        <div class="logo-box">
            <svg width="40" height="40" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
            </svg>
        </div>
        
        <!-- Title -->
        <h1 style="text-align:center; font-size:28px; font-weight:900; color:#1f2937; margin-bottom:8px;">
            سوبر ماركت العباسي
        </h1>
        <p style="text-align:center; font-size:14px; color:#6b7280; margin-bottom:32px;">
            نظام إدارة المشتريات والمخزون
        </p>
        
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert {% if category == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        
        <!-- Login Form -->
        <form method="POST" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label class="form-label">رقم المستخدم</label>
                <input type="text" name="username" id="username" class="form-input" 
                       placeholder="أدخل رقم المستخدم" required autofocus inputmode="numeric">
            </div>
            
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <input type="password" name="password" id="password" class="form-input" 
                       placeholder="أدخل كلمة المرور" required>
            </div>
            
            <div class="remember-box">
                <input type="checkbox" id="remember">
                <label for="remember">تذكرني</label>
            </div>
            
            <button type="submit" class="btn-login">
                تسجيل الدخول
            </button>
        </form>
        
        <!-- POS Link -->
        <a href="/pos/login" class="pos-link">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
            </svg>
            <span>دخول نقطة البيع (كاشير)</span>
        </a>
    </div>
    
    <!-- Footer -->
    <p class="footer-text" style="position:fixed; bottom:20px; left:0; right:0;">
        نظام إدارة السوبرماركت &copy; 2026
    </p>
    
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        if (localStorage.getItem("sm_rem") === "1") {
            document.getElementById("username").value = localStorage.getItem("sm_user") || "";
            document.getElementById("remember").checked = true;
        }
    });
    document.getElementById("loginForm").addEventListener("submit", function() {
        if (document.getElementById("remember").checked) {
            localStorage.setItem("sm_user", document.getElementById("username").value);
            localStorage.setItem("sm_rem", "1");
        } else {
            localStorage.removeItem("sm_user");
            localStorage.removeItem("sm_rem");
        }
    });
    </script>
</body>
</html>
